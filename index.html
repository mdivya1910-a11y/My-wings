<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Wings</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: radial-gradient(circle at center, #2a0a0a 0%, #0d0d0d 70%);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  overflow:hidden;
  font-family: Georgia, serif;
}

/* Quote */
.quote {
  color: rgba(255,255,255,0.9);
  font-size:18px;
  font-style:italic;
  text-align:center;
  margin-bottom:20px;
  text-shadow:0 0 12px rgba(255,255,255,0.25);
}

/* Butterfly motion */
.butterfly {
  animation: float 5s ease-in-out infinite, glow 3s ease-in-out infinite;
}

/* Natural floating */
@keyframes float {
  0%   { transform: translate(0px, 0px); }
  25%  { transform: translate(6px, -10px); }
  50%  { transform: translate(-4px, -18px); }
  75%  { transform: translate(5px, -8px); }
  100% { transform: translate(0px, 0px); }
}

/* Glow pulse */
@keyframes glow {
  0%,100% { filter: drop-shadow(0 0 8px rgba(180,0,0,0.3)); }
  50% { filter: drop-shadow(0 0 25px rgba(255,0,0,0.7)); }
}
