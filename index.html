<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Red Butterfly</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .quote {
    color: rgba(255, 255, 255, 0.92);
    font-family: 'Georgia', serif;
    font-size: 18px;
    font-style: italic;
    letter-spacing: 0.05em;
    text-align: center;
    padding: 0 30px;
    margin-bottom: 10px;
    text-shadow: 0 0 12px rgba(255,255,255,0.2);
  }

  .butterfly {
    animation: hover 3s ease-in-out infinite, pulse 2.5s ease-in-out infinite;
  }

  @keyframes hover {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-18px); }
  }

  @keyframes pulse {
    0%, 100% { filter: drop-shadow(0 0 8px rgba(180,0,0,0.3)) drop-shadow(0 0 18px rgba(180,0,0,0.15)); }
    50% { filter: drop-shadow(0 0 18px rgba(220,0,0,0.7)) drop-shadow(0 0 35px rgba(180,0,0,0.35)); }
  }

  .wings {
    animation: flap 1.4s ease-in-out infinite;
    transform-origin: 50% 50%;
  }

  @keyframes flap {
    0%, 100% { transform: scaleX(1); }
    50% { transform: scaleX(0.65); }
  }

  /* Music Button */
  .music-btn {
    position: fixed;
    bottom: 24px;
    left: 24px;
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50%;
    width: 42px;
    height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
    transition: background 0.3s, border-color 0.3s;
    z-index: 10;
  }

  .music-btn:hover {
    background: rgba(180,0,0,0.25);
    border-color: rgba(180,0,0,0.5);
  }

  /* Built by */
  .credit {
    position: fixed;
    bottom: 20px;
    right: 24px;
    text-align: right;
    font-family: 'Georgia', serif;
    line-height: 1.4;
  }
</style>
</head>
<body>

<!-- Music -->
<audio id="bg-music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- Quote -->
<div class="quote">"She had wings — she just forgot she could fly… until now."</div>

<!-- Butterfly -->
<svg class="butterfly" width="420" height="420" viewBox="0 0 420 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="redRU" cx="80%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#dd0000"/>
      <stop offset="40%" stop-color="#aa0000" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1a1a1a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="redRL" cx="80%" cy="80%" r="55%">
      <stop offset="0%" stop-color="#cc0000"/>
      <stop offset="40%" stop-color="#990000" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#1a1a1a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="redLU" cx="20%" cy="20%" r="60%">
      <stop offset="0%" stop-color="#dd0000"/>
      <stop offset="40%" stop-color="#aa0000" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1a1a1a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="redLL" cx="20%" cy="80%" r="55%">
      <stop offset="0%" stop-color="#cc0000"/>
      <stop offset="40%" stop-color="#990000" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#1a1a1a" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bodyglow" x="-80%" y="-20%" width="260%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g class="wings">
   .wings {
  transform-origin: 210px 210px;
  animation: flap 1.2s ease-in-out infinite;
}

@keyframes flap {
  0%, 100% { transform: rotateY(0deg); }
  50% { transform: rotateY(25deg); }
}

    <path d="M207 218 C195 242, 175 272, 158 295 C141 318, 120 334, 106 328 C86 318, 88 290, 102 268 C116 246, 155 222, 207 216" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.2" filter="url(#glow)"/>
    <path d="M207 218 C188 240, 168 264, 150 284" fill="none" stroke="rgba(255,255,255,0.30)" stroke-width="0.9"/>
    <path d="M207 218 C192 238, 174 260, 160 278" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="0.85"/>
    <path d="M207 218 C196 236, 182 255, 170 270" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="0.8"/>
  </g>

  <!-- BODY -->
  <line x1="210" y1="170" x2="210" y2="310" stroke="rgba(255,255,255,0.1)" stroke-width="12" filter="url(#bodyglow)" stroke-linecap="round"/>
  <path d="M210 172 C212 190, 213 210, 212 230 C211 250, 209 270, 208 295" fill="none" stroke="white" stroke-width="2.8" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Head -->
  <circle cx="210" cy="168" r="7" fill="white" filter="url(#glow)"/>

  <!-- Antennae -->
  <path d="M210 163 C206 150, 192 138, 178 130" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="1.4" stroke-linecap="round"/>
  <path d="M210 163 C214 150, 214 137, 210 128" fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="1.3" stroke-linecap="round"/>
  <circle cx="178" cy="130" r="3" fill="rgba(255,255,255,0.95)"/>
  <circle cx="210" cy="128" r="3" fill="rgba(255,255,255,0.95)"/>
</svg>

<!-- Music Toggle Button -->
<div class="music-btn" id="musicBtn" onclick="toggleMusic()" title="Toggle Music">🔇</div>

<!-- Built by -->
<div class="credit">
  <div style="color: rgba(200,200,200,0.7); font-size: 13px; font-style: italic; letter-spacing: 0.06em; font-family: Georgia, serif;">Built by</div>
  <div style="color: rgba(210,40,40,0.9); font-size: 18px; font-style: italic; letter-spacing: 0.08em; font-family: Georgia, serif; text-shadow: 0 0 8px rgba(180,0,0,0.4);">M. Divya</div>
</div>

<script>
  const music = document.getElementById('bg-music');
  const btn = document.getElementById('musicBtn');
  let playing = false;

  document.body.addEventListener('click', function startMusic() {
    if (!playing) {
      music.play();
      playing = true;
      btn.textContent = '🎵';
    }
  });

  function toggleMusic() {
    if (playing) {
      music.pause();
      playing = false;
      btn.textContent = '🔇';
    } else {
      music.play();
      playing = true;
      btn.textContent = '🎵';
    }
  }

</script>

</body>
</html>
