<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Wings</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: radial-gradient(circle at center, #2a0a0a 0%, #0d0d0d 70%);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  overflow:hidden;
  font-family: Georgia, serif;
}

/* Quote */
.quote {
  color: rgba(255,255,255,0.9);
  font-size:18px;
  font-style:italic;
  text-align:center;
  margin-bottom:20px;
  text-shadow:0 0 12px rgba(255,255,255,0.25);
}

/* Butterfly motion */
.butterfly {
  animation: float 5s ease-in-out infinite, glow 3s ease-in-out infinite;
}

/* Natural floating */
@keyframes float {
  0%   { transform: translate(0px, 0px); }
  25%  { transform: translate(6px, -10px); }
  50%  { transform: translate(-4px, -18px); }
  75%  { transform: translate(5px, -8px); }
  100% { transform: translate(0px, 0px); }
}

/* Glow pulse */
@keyframes glow {
  0%,100% { filter: drop-shadow(0 0 8px rgba(180,0,0,0.3)); }
  50% { filter: drop-shadow(0 0 25px rgba(255,0,0,0.7)); }
}

/* Wings */
.wings-left {
  animation: flap 1.3s ease-in-out infinite;
  transform-origin: center;
}

.wings-right {
  animation: flap 1.3s ease-in-out infinite;
  transform-origin: center;
  animation-delay: 0.15s;
}

/* Realistic flap */
@keyframes flap {
  0%   { transform: rotate(-6deg); }
  50%  { transform: rotate(6deg); }
  100% { transform: rotate(-6deg); }
}

/* Music button */
.music-btn {
  position:fixed;
  bottom:20px;
  left:20px;
  width:44px;
  height:44px;
  border-radius:50%;
  background:rgba(255,255,255,0.08);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  border:1px solid rgba(255,255,255,0.2);
  font-size:18px;
  transition:0.3s;
}

.music-btn:hover {
  background:rgba(255,0,0,0.3);
}

/* Credit */
.credit {
  position:fixed;
  bottom:20px;
  right:20px;
  text-align:right;
  font-size:14px;
  color:rgba(255,255,255,0.6);
}
</style>
</head>

<body>

<!-- Music -->
<audio id="bg-music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- Quote -->
<div class="quote">
  "She didn’t lose her wings… she just stopped believing in them."
</div>

<!-- Butterfly -->
<svg class="butterfly" width="420" height="420" viewBox="0 0 420 420">

<defs>
  <radialGradient id="redRU" cx="80%" cy="20%" r="60%">
    <stop offset="0%" stop-color="#cc0000"/>
    <stop offset="100%" stop-color="transparent"/>
  </radialGradient>
  <radialGradient id="redRL" cx="80%" cy="80%" r="60%">
    <stop offset="0%" stop-color="#cc0000"/>
    <stop offset="100%" stop-color="transparent"/>
  </radialGradient>
  <radialGradient id="redLU" cx="20%" cy="20%" r="60%">
    <stop offset="0%" stop-color="#cc0000"/>
    <stop offset="100%" stop-color="transparent"/>
  </radialGradient>
  <radialGradient id="redLL" cx="20%" cy="80%" r="60%">
    <stop offset="0%" stop-color="#cc0000"/>
    <stop offset="100%" stop-color="transparent"/>
  </radialGradient>
</defs>

<!-- Center glow -->
<circle cx="210" cy="220" r="40" fill="rgba(255,0,0,0.15)" />

<!-- Wings -->
<g class="wings-left">

<path d="M207 195 C200 165, 180 130, 155 108 C130 86, 100 78, 82 92 C60 110, 72 150, 98 175 C120 196, 162 205, 207 208 Z"
fill="url(#redLU)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>

<path d="M207 218 C195 242, 175 272, 158 295 C141 318, 120 334, 106 328 C86 318, 88 290, 102 268 C116 246, 155 222, 207 215 Z"
fill="url(#redLL)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>

</g>

<g class="wings-right">

<path d="M213 195 C220 165, 240 130, 265 108 C290 86, 320 78, 338 92 C360 110, 348 150, 322 175 C300 196, 258 205, 213 208 Z"
fill="url(#redRU)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>

<path d="M213 218 C225 242, 245 272, 262 295 C279 318, 300 334, 314 328 C334 318, 332 290, 318 268 C304 246, 265 222, 213 215 Z"
fill="url(#redRL)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>

</g>

<!-- Body -->
<line x1="210" y1="170" x2="210" y2="310" stroke="white" stroke-width="3"/>

</svg>

<!-- Music Button -->
<div class="music-btn" onclick="toggleMusic()" id="btn">🔇</div>

<!-- Credit -->
<div class="credit">
  Built by<br><b>M. Divya</b>
</div>

<script>
const music = document.getElementById("bg-music");
const btn = document.getElementById("btn");
let playing = false;

function toggleMusic() {
  if(playing){
    music.pause();
    btn.textContent = "🔇";
  } else {
    music.play();
    btn.textContent = "🎵";
  }
  playing = !playing;
}
</script>

</body>
</html>
