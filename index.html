<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Wings</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: radial-gradient(circle at center, #2a0a0a 0%, #0d0d0d 70%);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:100vh;
  overflow:hidden;
  font-family: Georgia, serif;
}

/* Quote */
.quote {
  color: rgba(255,255,255,0.9);
  font-size:18px;
  font-style:italic;
  letter-spacing:0.05em;
  text-align:center;
  margin-bottom:20px;
  text-shadow:0 0 10px rgba(255,255,255,0.2);
}

/* Butterfly motion */
.butterfly {
  animation: float 4s ease-in-out infinite, glowPulse 3s ease-in-out infinite;
}

@keyframes float {
  0%   { transform: translate(0px, 0px); }
  25%  { transform: translate(6px, -12px); }
  50%  { transform: translate(-4px, -20px); }
  75%  { transform: translate(5px, -10px); }
  100% { transform: translate(0px, 0px); }
}

@keyframes glowPulse {
  0%,100% { filter: drop-shadow(0 0 10px rgba(180,0,0,0.3)); }
  50% { filter: drop-shadow(0 0 25px rgba(255,0,0,0.7)); }
}

/* Wings */
.wings {
  animation: flap 1.2s ease-in-out infinite;
  transform-origin:center;
}

@keyframes flap {
  0% { transform: rotateY(0deg); }
  50% { transform: rotateY(35deg); }
  100% { transform: rotateY(0deg); }
}

/* Music Button */
.music-btn {
  position:fixed;
  bottom:20px;
  left:20px;
  width:42px;
  height:42px;
  border-radius:50%;
  background:rgba(255,255,255,0.08);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  border:1px solid rgba(255,255,255,0.2);
  font-size:18px;
}

.music-btn:hover {
  background:rgba(255,0,0,0.3);
}

/* Credit */
.credit {
  position:fixed;
  bottom:20px;
  right:20px;
  text-align:right;
  color:rgba(255,255,255,0.6);
  font-size:14px;
}

</style>
</head>

<body>

<audio id="bg-music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="quote">
  "She didn’t lose her wings… she just stopped believing in them."
</div>

<svg class="butterfly" width="420" height="420" viewBox="0 0 420 420">

<defs>
  <radialGradient id="red" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="#ff0000"/>
    <stop offset="100%" stop-color="transparent"/>
  </radialGradient>
</defs>

<g class="wings">
  <ellipse cx="140" cy="200" rx="100" ry="140" fill="url(#red)" opacity="0.5"/>
  <ellipse cx="280" cy="200" rx="100" ry="140" fill="url(#red)" opacity="0.5"/>
</g>

<!-- Body -->
<line x1="210" y1="150" x2="210" y2="300" stroke="white" stroke-width="3"/>

</svg>

<div class="music-btn" onclick="toggleMusic()" id="btn">🔇</div>

<div class="credit">
  Built by<br><b>M. Divya</b>
</div>

<script>
const music = document.getElementById("bg-music");
const btn = document.getElementById("btn");
let playing = false;

function toggleMusic() {
  if(playing){
    music.pause();
    btn.textContent = "🔇";
  } else {
    music.play();
    btn.textContent = "🎵";
  }
  playing = !playing;
}
</script>

</body>
</html>
